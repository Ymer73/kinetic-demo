<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable | Kinetic</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="shared.css">
<style>
  .err-wrap {
    min-height: calc(100vh - 160px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 80px 24px;
    position: relative;
  }
  .err-blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .err-blobs .b1 { width: 600px; height: 600px; top: -200px; left: -200px; }
  .err-blobs .b2 { width: 500px; height: 500px; bottom: -200px; right: -200px; }

  .err-inner { position: relative; z-index: 2; max-width: 640px; }

  .err-num {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(120px, 22vw, 240px);
    line-height: .85;
    letter-spacing: -.02em;
    color: var(--ink);
    -webkit-text-stroke: 3px var(--ink);
    color: transparent;
    margin-bottom: 8px;
    user-select: none;
  }
  .err-icon { font-size: 64px; margin-bottom: 16px; animation: bob 3s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
  @media (prefers-reduced-motion: reduce) { .err-icon { animation: none; } }

  .err-title {
    font-family: 'Archivo Narrow', Impact, sans-serif;
    font-weight: 700;
    font-size: clamp(32px, 6vw, 64px);
    line-height: .92;
    letter-spacing: -.02em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .err-title .accent { color: var(--orange); font-style: italic; font-weight: 500; }

  .err-sub {
    font-size: 16px;
    color: var(--gray);
    line-height: 1.5;
    max-width: 400px;
    margin: 0 auto 36px;
  }

  .err-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  @media (max-width: 600px) {
    .err-wrap { padding: 40px 18px; min-height: calc(100vh - 200px); }
    .err-num { font-size: clamp(96px, 28vw, 160px); -webkit-text-stroke: 2px var(--ink); margin-bottom: 4px; }
    .err-icon { font-size: 48px; margin-bottom: 12px; }
    .err-title { font-size: clamp(26px, 8vw, 38px); margin-bottom: 12px; }
    .err-sub { font-size: 14px; margin: 0 auto 24px; }
    .err-actions { flex-direction: column; gap: 10px; width: 100%; max-width: 320px; margin: 0 auto; }
    .err-actions .btn { width: 100%; justify-content: center; }
  }
</style>
  <meta name="robots" content="noindex, nofollow">
  <script src="demo-mode.js"></script>
</head>
<body>
<a href="#main-content" class="skip-link">Aller au contenu</a>
<script src="components/nav.js"></script>

<div class="err-blobs" aria-hidden="true">
  <div class="blob blob-orange b1"></div>
  <div class="blob blob-violet b2"></div>
</div>

<main id="main-content" class="err-wrap">
  <div class="err-inner">
    <div class="err-num" aria-hidden="true">404</div>
    <div class="err-icon" aria-hidden="true">🏃</div>
    <h1 class="err-title">Cette page a <span class="accent">disparu</span></h1>
    <p class="err-sub">
      On cherche parmi 290 sports mais pas cette page, elle n'existe pas ou a été déplacée.
    </p>
    <div class="err-actions">
      <a href="index.html" class="btn btn-primary btn-lg">Retour à l'accueil</a>
      <a href="trouver-club.html" class="btn btn-glass btn-lg">Trouver mon sport</a>
    </div>
  </div>
</main>

<script src="components/footer.js" defer></script>
<script src="components/cookie-banner.js" defer></script>
</body>
</html>
