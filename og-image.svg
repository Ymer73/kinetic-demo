    <radialGradient id="blobOrange" cx="0.85" cy="0.75" r="0.6">
      <stop offset="0" stop-color="#FF5A1F" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#blobViolet)"/>
  <rect width="1200" height="630" fill="url(#blobOrange)"/>

