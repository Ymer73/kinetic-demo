  <text x="600" y="590" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="#9992C0" text-anchor="middle" letter-spacing="2">125 000 clubs en France · Quiz adaptatif</text>
