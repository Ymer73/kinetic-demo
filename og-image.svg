<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0B1F"/>
      <stop offset="1" stop-color="#16122E"/>
    </linearGradient>
    <radialGradient id="blobViolet" cx="0.2" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#6C47FF" stop-opacity="0.65"/>
      <stop offset="0.7" stop-color="#6C47FF" stop-opacity="0"/>
