<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fédérations sportives françaises | Kinetic</title>
<meta name="description" content="Toutes les fédérations sportives françaises présentes sur Kinetic, avec leurs disciplines, clubs et liens officiels.">
<link rel="canonical" href="https://kinetic.app/federations.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Fédérations sportives françaises | Kinetic">
<meta property="og:description" content="Toutes les fédérations sportives françaises présentes sur Kinetic, avec leurs disciplines, clubs et liens officiels.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#6C47FF">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="enhance-2026.css">
<style>
  .feds-wrap { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; position: relative; }

  /* HERO */
  .feds-hero {
    background: var(--ink);
    color: white;
    border-radius: 40px;
    padding: 56px 48px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .feds-hero::before {
    content: '';
    position: absolute;
    right: -10%; top: -30%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--violet) 0%, transparent 70%);
    opacity: .5;
  }
  .feds-hero::after {
    content: '';
    position: absolute;
    left: -5%; bottom: -40%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--orange) 0%, transparent 70%);
    opacity: .35;
  }
  .feds-hero-inner { position: relative; z-index: 2; max-width: 800px; }
  .feds-eyebrow { font-family: 'Archivo Narrow', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .15em; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; }
  .feds-h1 { font-family: 'Bebas Neue', Impact, sans-serif; font-size: clamp(48px, 7vw, 88px); line-height: .95; letter-spacing: -.02em; text-transform: uppercase; margin-bottom: 24px; }
  .feds-sub { font-size: 18px; line-height: 1.6; opacity: .85; margin-bottom: 24px; max-width: 640px; }
  .feds-stats { display: flex; flex-wrap: wrap; gap: 32px; margin-top: 32px; }
  .feds-stat { display: flex; flex-direction: column; }
  .feds-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: var(--orange); }
  .feds-stat-lab { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; opacity: .7; margin-top: 4px; }

  /* Search bar */
  .feds-search {
    margin-bottom: 32px;
    position: relative;
  }
  .feds-search input {
    width: 100%;
    padding: 18px 24px 18px 56px;
    font-size: 16px;
    font-family: inherit;
    background: white;
    border: 2px solid var(--border);
    border-radius: 100px;
    color: var(--ink);
    transition: all .2s;
  }
  .feds-search input:focus { border-color: var(--violet); outline: none; box-shadow: 0 0 0 4px rgba(108, 71, 255, .15); }
  .feds-search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--gray); pointer-events: none; }

  /* Grid */
  .feds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .fed-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    transition: all .25s;
    position: relative;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .fed-card:hover {
    border-color: var(--violet);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(108, 71, 255, .15);
  }
  .fed-card-acro {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 32px;
    line-height: 1;
    letter-spacing: -.01em;
    color: var(--violet);
  }
  .fed-card-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }
  .fed-card-stats {
    display: flex;
    gap: 16px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .fed-card-stat {
    display: flex;
    flex-direction: column;
  }
  .fed-card-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
  }
  .fed-card-stat-lab {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-top: 4px;
  }
  .fed-verif-tag {
    display: inline-block;
    width: 18px; height: 18px;
    line-height: 18px;
    text-align: center;
    background: #16a34a;
    color: white;
    border-radius: 50%;
    font-size: 11px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .feds-empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--gray);
    font-size: 16px;
  }

  @media (max-width: 768px) {
    .feds-wrap { padding: 16px 14px 80px; }
    .feds-hero { padding: 28px 22px; border-radius: 24px; margin-bottom: 20px; }
    .feds-h1 { font-size: clamp(34px, 10vw, 56px); margin-bottom: 14px; }
    .feds-sub { font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
    .feds-stats { gap: 20px; margin-top: 20px; }
    .feds-stat-num { font-size: 36px; }
    .feds-search { margin-bottom: 20px; }
    .feds-search input { padding: 14px 20px 14px 48px; font-size: 16px; }
    .feds-search-icon { left: 18px; }
    .feds-grid { grid-template-columns: 1fr; gap: 12px; }
    .fed-card { padding: 20px 18px; border-radius: 18px; gap: 12px; }
    .fed-card-acro { font-size: 26px; }
    .fed-card-name { font-size: 14px; }
    .fed-card-stats { padding-top: 12px; gap: 12px; }
    .fed-card-stat-num { font-size: 18px; }
    .feds-empty { padding: 40px 16px; font-size: 14px; }
  }
</style>
<!-- Apple PWA -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kinetic">
<meta name="mobile-web-app-capable" content="yes">
  <meta name="robots" content="noindex, nofollow">
  <script src="demo-mode.js"></script>
</head>
<body>
<a href="#main-content" class="skip-link">Aller au contenu</a>
<script src="components/nav.js"></script>

<main id="main-content" class="feds-wrap">
  <section class="feds-hero">
    <div class="feds-hero-inner">
      <div class="feds-eyebrow">Fédérations</div>
      <h1 class="feds-h1">Toutes les fédérations<br>sportives françaises</h1>
      <p class="feds-sub">Explore les fédérations qui structurent le sport en France. Chaque fédé administre ses propres disciplines et regroupe ses clubs affiliés.</p>
      <div class="feds-stats" id="hero-stats"></div>
    </div>
  </section>

  <div class="feds-search">
    <span class="feds-search-icon" data-icon="search" data-size="20" aria-hidden="true"></span>
    <input type="search" id="fed-search" placeholder="Chercher une fédération (FFR, judo, escalade...)" aria-label="Rechercher une fédération">
  </div>

  <section class="feds-grid" id="feds-grid" aria-live="polite"></section>
  <div class="feds-empty" id="feds-empty" style="display:none">Aucune fédération ne correspond à ta recherche.</div>
</main>

<script src="components/footer.js"></script>
<script src="icons.js"></script>
<script>
(async function() {
  // Charge les 109 fédérations depuis le JSON (source unique de vérité)
  const FEDERATIONS = await fetch('federations-data.json').then(r => r.json()).catch(() => []);

  const grid = document.getElementById('feds-grid');
  const emptyEl = document.getElementById('feds-empty');
  const searchInput = document.getElementById('fed-search');
  const heroStats = document.getElementById('hero-stats');

  // Hero stats : utilise clubs/index.json (chiffres reels scrapes), fallback sur clubs_base annonces
  const totalFeds = FEDERATIONS.length;
  const renderHeroStats = (totalClubs, totalSports) => {
    heroStats.innerHTML = `
      <div class="feds-stat"><div class="feds-stat-num">${totalFeds}</div><div class="feds-stat-lab">Fédérations</div></div>
      <div class="feds-stat"><div class="feds-stat-num">${totalSports}</div><div class="feds-stat-lab">Disciplines</div></div>
      <div class="feds-stat"><div class="feds-stat-num">${totalClubs.toLocaleString('fr')}</div><div class="feds-stat-lab">Clubs</div></div>
    `;
  };
  fetch('clubs/index.json?v=4').then(r => r.json()).then(idx => {
    renderHeroStats(idx.total, idx.totalDisciplines);
  }).catch(() => {
    renderHeroStats(
      FEDERATIONS.reduce((s, f) => s + (f.clubs_base || 0), 0),
      new Set(FEDERATIONS.flatMap(f => (f.sports_base || []).map(s => s.id))).size
    );
  });

  function fedCard(f) {
    // Si vérifié : nb disciplines réel ; sinon nb sports en base
    const sportsCount = f.disciplines_verified
      ? (f.sports_officiel || []).length
      : (f.sports_base || []).length;
    const verifTag = f.disciplines_verified
      ? '<span class="fed-verif-tag" title="Disciplines vérifiées sur site officiel">✓</span>'
      : '';
    return `
      <a href="federation.html?f=${encodeURIComponent(f.slug)}" class="fed-card">
        <div class="fed-card-acro">${f.acronyme} ${verifTag}</div>
        <div class="fed-card-name">${f.nom}</div>
        <div class="fed-card-stats">
          <div class="fed-card-stat">
            <div class="fed-card-stat-num">${(f.clubs_base || 0).toLocaleString('fr')}</div>
            <div class="fed-card-stat-lab">Clubs</div>
          </div>
          <div class="fed-card-stat">
            <div class="fed-card-stat-num">${sportsCount}</div>
            <div class="fed-card-stat-lab">Sports</div>
          </div>
        </div>
      </a>
    `;
  }

  function render(filter = '') {
    const q = filter.toLowerCase().trim();
    const filtered = q
      ? FEDERATIONS.filter(f =>
          (f.acronyme || '').toLowerCase().includes(q) ||
          (f.nom || '').toLowerCase().includes(q) ||
          (f.discs || []).some(d => d.toLowerCase().includes(q)) ||
          (f.sports_base || []).some(s => (s.nom || '').toLowerCase().includes(q))
        )
      : FEDERATIONS;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      emptyEl.style.display = 'block';
    } else {
      grid.innerHTML = filtered.map(fedCard).join('');
      emptyEl.style.display = 'none';
    }
    if (window.hydrateIcons) window.hydrateIcons();
  }

  searchInput.addEventListener('input', (e) => render(e.target.value));
  render();
})();
</script>
<script src="components/cookie-banner.js"></script>
<script src="enhance-2026.js" defer></script>
</body>
</html>
