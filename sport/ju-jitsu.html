// Charge les vrais formats depuis federations-data.json
async function loadRealFormats() {
  try {
    const res = await fetch('federations-data.json');
    const feds = await res.json();
    const formats = [];
    const seen = new Set();
    feds.forEach(f => {
      (f.sports_officiel || []).forEach(o => {
        if (o.sport_id === sport.id) {
          const label = (o.label || '').trim();
          if (!label || seen.has(label)) return;
          seen.add(label);
          formats.push({ label, fed: f.acronyme, fedSlug: f.slug });
        }
      });
    });

    if (formats.length < 2) return; // pas assez de variantes, on garde le fallback

    // Mapper en cards avec icônes/tags selon le contenu du label
    const labeled = formats.map(f => {
      const lower = f.label.toLowerCase();
      let icon = sportIconName, tag = '';
      if (lower.includes('féminin') || lower.includes('feminin')) { icon = 'spark'; tag = 'FÉMININ'; }
      else if (lower.includes('jeunes') || lower.includes('école') || lower.includes('mini')) { icon = 'spark'; tag = 'JEUNES'; }
      else if (lower.includes('loisir') || lower.includes('détente') || lower.includes('santé')) { icon = 'spark'; tag = 'LOISIR'; }
      else if (lower.includes('compét') || lower.includes('compet')) { icon = 'trophy'; tag = 'COMPÉT'; }
      else if (lower.includes('handi') || lower.includes('adapté')) { icon = 'spark'; tag = 'HANDI'; }
      else if (lower.includes('beach') || lower.includes('plage')) { icon = 'spark'; tag = 'PLAGE'; }
      else if (lower.match(/à\s*\d+/)) { icon = sportIconName; tag = f.label.match(/à\s*\d+/)[0].toUpperCase(); }
      else { icon = sportIconName; tag = f.fed; }
      return { icon, name: f.label, tag, fed: f.fed };
    });

    // Récupérer le dept de l'utilisateur si dispo
    let userDept = null;
    try {
      const v2 = JSON.parse(sessionStorage.getItem('kinetic_v2_results'));
      if (v2 && v2.dept) userDept = v2.dept;
    } catch(e){}

    // Si on a un dept, compter par pratique pour FFF, ou par disc pour les autres
    let deptCount = null;
    if (userDept) {
      try {
        const dres = await fetch(`clubs/dept-${userDept}.json`);
        if (dres.ok) {
          const dd = await dres.json();
          const clubs = Array.isArray(dd) ? dd : (dd.clubs || []);
          deptCount = {};
          for (const c of clubs) {
            if (!c.sport_ids?.includes(sport.id)) continue;
            // Pour FFF on a c.pratiques avec libellés
            if (Array.isArray(c.pratiques) && c.pratiques.length) {
              c.pratiques.forEach(p => {
                const key = (p.label || p.nom || p).toString().trim();
                if (key) deptCount[key] = (deptCount[key] || 0) + 1;
              });
            } else {
              // Sinon on incrémente le compte général "Pratique standard"
              deptCount['_total'] = (deptCount['_total'] || 0) + 1;
            }
          }
        }
      } catch(e){}
    }

    // Renderer le bloc
    const grid = document.querySelector('.disc-grid');
    if (!grid) return;
    grid.innerHTML = labeled.map(d => {
      let countStr = '';
      if (deptCount) {
        // Match approximatif sur le label
        let match = 0;
        Object.entries(deptCount).forEach(([k, v]) => {
          if (k === '_total') return;
          if (k.toLowerCase().includes(d.name.toLowerCase()) || d.name.toLowerCase().includes(k.toLowerCase())) {
            match += v;
          }
        });
        countStr = match > 0 ? `<div class="disc-local">📍 ${match} club${match>1?'s':''} dans le ${userDept}</div>` : '';
      }
      return `
        <div class="disc-card">
          <div class="disc-icon">${icon(d.icon, 22)}</div>
          <div class="disc-name">${d.name}</div>
          <span class="disc-tag">${d.tag}</span>
          ${countStr}
        </div>
      `;
    }).join('');

    // Update le counter "X variantes"
    const pillEl = document.querySelector('.sec-h .pill');
    if (pillEl) pillEl.textContent = `${labeled.length} format${labeled.length>1?'s':''}`;

    // Update le titre pour préciser
    const secH = document.querySelector('.sec-h h2');
    if (secH) secH.innerHTML = `Formats <span class="accent">disponibles</span>${userDept ? ` dans le ${userDept}` : ''}`;
  } catch(e) {
    console.warn('[sport.html] formats load failed:', e);
  }
}

// Lance la recherche via la géolocalisation du navigateur.
async function loadNearbyClubsByGeoloc() {
  const btn = document.getElementById('clubs-locate-geoloc');
  const label = document.getElementById('clubs-location-label');
  const container = document.getElementById('clubs-grid-container');

  if (!navigator.geolocation) {
    label.textContent = 'Géolocalisation non supportée. Utilise le code postal.';
    return;
  }

  label.textContent = 'Localisation en cours…';
  if (btn) btn.disabled = true;

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 })
    );
    const { latitude: lat, longitude: lng } = pos.coords;
    label.textContent = `Recherche autour de ${lat.toFixed(2)}, ${lng.toFixed(2)}…`;
    const depCode = getDeptFromCoords(lat, lng);
    await showClubsByDept(depCode, lat, lng, container);
  } catch(e) {
    label.textContent = 'Géolocalisation refusée. Saisis ton code postal.';
    const input = document.getElementById('clubs-cp-input');
    if (input) input.focus();
  } finally {
    if (btn) btn.disabled = false;
  }
}

// Lance la recherche via un code postal saisi.
async function loadNearbyClubsByCP() {
  const input = document.getElementById('clubs-cp-input');
  const label = document.getElementById('clubs-location-label');
  const container = document.getElementById('clubs-grid-container');
  const cp = (input?.value || '').trim();

  if (!/^\d{5}$/.test(cp)) {
    label.textContent = 'Code postal invalide (5 chiffres attendus).';
    if (input) input.focus();
    return;
  }

  const depCode = getDeptFromCP(cp);
  if (!depCode) {
    label.textContent = 'Département non reconnu pour ce code postal.';
    return;
  }

  label.textContent = `Recherche autour du ${cp}…`;
  await showClubsByDept(depCode, null, null, container);
}

    // Filter by sport.id — le JSON dept-XX utilise sport_ids (array, fiable) et disc (slug, fiable).
    // ATTENTION : le champ singulier c.sport_id est CORROMPU dans la base (héritage du scraping)
    // et NE DOIT PAS être utilisé pour le matching (sinon padel renvoie 156 clubs de judo).
    const sportSlug = (typeof DISCIPLINES !== 'undefined')
      ? Object.entries(DISCIPLINES).find(([, d]) => Array.isArray(d.sport_ids) && d.sport_ids.includes(sport.id))?.[0]
      : null;
    const sportClubs = clubs.filter(c => {
      if (!c) return false;
      // Source 1 (fiable) : sport_ids array contient l'id du sport
      if (Array.isArray(c.sport_ids) && c.sport_ids.includes(sport.id)) return true;
      // Source 2 (fiable) : disc slug correspond à la discipline du sport
      if (sportSlug && c.disc === sportSlug) return true;
      // Source 3 (legacy/array) : c.sports array
      if (Array.isArray(c.sports) && c.sports.includes(sport.id)) return true;
      return false;
    });

    // Compute distances only when user position is known; memoize by club id
    if (userLat !== null && userLng !== null) {
      clearDistCache();
      sportClubs.forEach(c => {
        const lon = c.lon ?? c.lng;
        if (typeof c.lat === 'number' && typeof lon === 'number') {
          c._dist = haversine(userLat, userLng, c.lat, lon, c.id);
        }
      });
      sportClubs.sort((a, b) => (a._dist ?? Infinity) - (b._dist ?? Infinity));
    }

    const nearby = sportClubs.slice(0, 6);
    // Fix 2026-05-27 : optional chaining sur depts (le JSON n'a pas cette clé)
    // Fallback : utiliser DEPT_CENTERS[depCode].nom (chargé via dept-geo.js)
    const depName = (typeof DEPT_CENTERS !== 'undefined' && DEPT_CENTERS && DEPT_CENTERS[depCode] && DEPT_CENTERS[depCode].nom)
      || depCode;
    label.textContent = `${sportClubs.length} équipements · Dép. ${depName}`;

    if (nearby.length === 0) {
      container.innerHTML = `
        <div class="clubs-empty">
          <div class="clubs-empty-icon">🔍</div>
          <p class="clubs-empty-title">Clubs non encore référencés pour <em>${sport.nom}</em></p>
          <p class="clubs-empty-sub">Notre base de données ne couvre pas encore tous les sports dans chaque département. Aidez-nous à l'enrichir !</p>
          <div class="clubs-empty-actions">
            <a href="mailto:clubs@kinetic.fr?subject=Suggestion de club — ${encodeURIComponent(sport.nom)}&body=Bonjour,%0A%0AJe pratique ${encodeURIComponent(sport.nom)} et souhaite signaler un club :%0A%0ANom du club :%0AAdresse :%0ASite web :%0A%0AMerci !"
               class="btn btn-accent btn-sm">Suggérer un club</a>
            <a href="map.html" class="btn btn-ghost btn-sm">Explorer tous les clubs</a>
          </div>
        </div>`;
      return;
    }

    const colors = ['var(--violet)', 'var(--orange)', 'var(--ink)', 'var(--violet)', 'var(--orange)', 'var(--ink)'];
    container.innerHTML = `<div class="clubs-grid">${nearby.map((c, i) => `
      <a href="club.html?id=${encodeURIComponent(c.id)}&dep=${depCode}" class="club-card" aria-label="${c.nom || 'Équipement sportif'}${c.ville ? ' à ' + c.ville : ''} — voir la fiche">
        <div class="club-top">
          <div class="club-icon" style="background:${colors[i%colors.length]}" aria-hidden="true">${icon('trophy', 18)}</div>
          ${c._dist !== undefined ? `<div class="club-km" aria-label="${c._dist < 1 ? (c._dist*1000|0)+' mètres' : c._dist.toFixed(1)+' kilomètres'}">${c._dist < 1 ? (c._dist*1000|0)+' M' : c._dist.toFixed(1)+' KM'}</div>` : ''}
        </div>
        <div class="club-name">${c.nom || 'Équipement sportif'}</div>
        <div class="club-addr">${c.cp ? c.cp+' ' : ''}${c.ville || ''}</div>
        <span class="club-link" aria-hidden="true">Voir sur la carte ${icon('arrow', 12)}</span>
      </a>
    `).join('')}</div>
    <div style="margin-top:12px;text-align:center">
      <a href="map.html" style="font-size:12px;color:var(--gray);font-weight:700;letter-spacing:.05em;text-transform:uppercase">
        Voir tous les ${sportClubs.length} équipements →
      </a>
    </div>`;
  } catch(err) {
    container.innerHTML = `<div style="padding:24px;color:var(--gray);text-align:center">Erreur de chargement. ${err.message}</div>`;
  }
}

document.getElementById('sport-content').innerHTML = `
  <section class="sp-hero" id="sp-hero-section">
    <div class="sp-hero-left">
      <div class="eye">KINETIC · FICHE SPORT · ${sport.cat.toUpperCase()}</div>
      <h1>${sport.nom}</h1>
      <p class="desc">Découvre tout sur ${sport.nom.toLowerCase()} : disciplines, clubs, fédérations, ton match.</p>
      <div class="sp-hero-tags">
        <span class="pill pill-orange">${sport.cat}</span>
        ${sport.scores[1] >= 3 ? '<span class="pill" style="background:rgba(255,255,255,.08);color:white;border-color:rgba(255,255,255,.15)">OUTDOOR</span>' : ''}
        ${sport.scores[4] >= 3 ? '<span class="pill" style="background:rgba(255,255,255,.08);color:white;border-color:rgba(255,255,255,.15)">COLLECTIF</span>' : '<span class="pill" style="background:rgba(255,255,255,.08);color:white;border-color:rgba(255,255,255,.15)">INDIVIDUEL</span>'}
        ${sport.scores[2] >= 4 ? '<span class="pill" style="background:rgba(255,255,255,.08);color:white;border-color:rgba(255,255,255,.15)">INTENSE</span>' : ''}
      </div>
    </div>
    <button class="sp-play-btn" aria-label="En savoir plus sur ${sport.nom}">${icon('play', 24)}</button>
  </section>

  <div class="info-grid">
    <div class="match-card">
      <div class="match-top">
        <div>
          <h3>Ton <span style="color:var(--orange);font-style:italic;font-weight:500">match</span> avec ce sport</h3>
          <p style="color:var(--gray);font-size:13px;margin-top:4px">Profil du sport sur 5 dimensions clés</p>
        </div>
        ${userCompat !== null
          ? `<div style="text-align:right"><div class="match-pct">${userCompat}%</div><div class="match-pct-small">MATCH</div></div>`
          : `<a href="trouver-club.html" class="btn btn-primary btn-sm">Trouver mon sport ${icon('arrow', 14)}</a>`}
      </div>
      <div class="dim-grid">
        ${dims.map(d => `
          <div class="dim-row">
            <span class="dim-lbl">${d.label}</span>
            <div class="dim-dots">${dimDots(sport.scores[d.idx])}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="stats-card">
      <h3>Les <span style="font-style:italic;font-weight:500">chiffres</span></h3>
      ${licencies.map(s => `
        <div class="stat-row"><span class="k">${s.label}</span><span class="v">${s.val}</span></div>
      `).join('')}
    </div>
  </div>

  ${renderMetaSections()}

  <div class="desc-section">
    <div class="desc-eyebrow">— À PROPOS</div>
    <h2 class="desc-h">Pourquoi <span class="italic">${sport.nom.toLowerCase()}</span> ?</h2>
    <div class="desc-text">
      ${desc.split('\n\n').map(p => `<p>${p}</p>`).join('')}
    </div>
  </div>

  ${sportRules.length ? `
  <div class="rules-section">
    <div class="rules-eyebrow">— RÈGLES DU SPORT</div>
    <h2 class="rules-h">Comment ça <span class="italic">marche</span> ?</h2>
    <ol class="rules-list">
      ${sportRules.map(r => `<li class="rules-item"><span class="rules-bullet" aria-hidden="true">${icon('check', 16)}</span><span class="rules-text">${r}</span></li>`).join('')}
    </ol>
  </div>
  ` : ''}

  <div class="clubs-wrap">
    <div class="clubs-top">
      <div class="sec-h" style="margin:0">
        <h2>Clubs <span class="accent">près de toi</span></h2>
      </div>
    </div>
    <div class="clubs-locate-bar" role="group" aria-label="Trouver les clubs proches">
      <button type="button" class="clubs-locate-btn" id="clubs-locate-geoloc" onclick="loadNearbyClubsByGeoloc()" aria-label="Me géolocaliser pour trouver les clubs proches">
        ${icon('pin', 16)}
        <span>Me géolocaliser</span>
      </button>
      <form class="clubs-locate-form" id="clubs-locate-form" onsubmit="event.preventDefault(); loadNearbyClubsByCP();" aria-label="Saisir un code postal">
        <label for="clubs-cp-input" class="sr-only">Code postal</label>
        <input
          type="text"
          inputmode="numeric"
          pattern="[0-9]{5}"
          maxlength="5"
          id="clubs-cp-input"
          placeholder="Ou ton code postal"
          aria-label="Code postal (5 chiffres)"
          autocomplete="postal-code"
        />
        <button type="submit" class="clubs-locate-submit" aria-label="Rechercher les clubs autour de ce code postal">
          ${icon('arrow', 14)}
        </button>
      </form>
      <div class="clubs-locate-status" id="clubs-location-label" aria-live="polite">${meta.clubsCount ? `${meta.clubsCount.toLocaleString('fr')} équipements en France` : ''}</div>
    </div>
    <div id="clubs-grid-container">
      <div style="text-align:center;padding:32px;color:var(--gray);font-size:13px">
        <div style="font-size:24px;margin-bottom:8px" aria-hidden="true">📍</div>
        Géolocalise-toi ou saisis ton code postal pour trouver les clubs de ${sport.nom.toLowerCase()} près de chez toi.
        ${meta.clubsCount ? `<div style="margin-top:8px;font-weight:700;color:var(--ink)">${meta.clubsCount.toLocaleString('fr')} équipements en France</div>` : ''}
      </div>
    </div>
  </div>

  <div class="sec-h">
    <h2>Tu pourrais <span class="accent">aussi aimer</span></h2>
  </div>
  <div class="related-grid">
    ${related.map((r, i) => `
      <a href="sport.html?id=${r.id}" class="related-card">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div class="related-num">№ ${String(i+1).padStart(2,'0')}</div>
          <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center">${icon('arrow', 14)}</div>
        </div>
        <div>
          <div class="related-icon">${sportIcon(r, 22)}</div>
          <div class="related-name">${r.nom}</div>
        </div>
      </a>
    `).join('')}
  </div>

  <div class="cta-bottom">
    <div>
      <h3>${userCompat !== null ? 'Explore d\'<span class="italic">autres</span> sports' : 'Pas encore fait <span class="italic">le quiz</span> ?'}</h3>
      <p>${userCompat !== null ? 'Découvre tes 5 sports compatibles et ton profil complet.' : 'Découvre les sports qui correspondent vraiment à ta personnalité.'}</p>
    </div>
    <a href="${userCompat !== null ? 'results.html' : 'quiz.html'}" class="btn btn-accent btn-lg">${userCompat !== null ? 'Mes résultats' : 'Commencer'} ${icon('arrow', 16)}</a>
  </div>
`;

// Applique la photo en background du hero si disponible
(function() {
  const photoUrl = (typeof getSportPhoto === 'function') ? getSportPhoto(sport) : null;
  if (photoUrl) {
    const hero = document.getElementById('sp-hero-section');
    if (hero) {
      hero.style.backgroundImage = `url('${photoUrl}')`;
      hero.classList.add('has-photo');
    }
  }
})();
</script>

<script src="enhance-2026.js" defer></script>
</body>
