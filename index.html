<style>
  /* ─── Custom cursor désactivé (cursor natif système) ─── */
  .cursor-dot, .cursor-ring, .cursor-label { display: none !important; }

  /* ─── READING PROGRESS ─── */
  .read-progress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--violet));
    transform-origin: left;
    transform: scaleX(0);
    z-index: 10000;
    will-change: transform;
    pointer-events: none;
  }

  /* ─── REVEAL ON SCROLL ─── */
  [data-reveal] {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1);
  }
  [data-reveal].is-revealed {
    opacity: 1;
    transform: none;
  }
  [data-reveal][data-delay="1"] { transition-delay: .12s; }
  [data-reveal][data-delay="2"] { transition-delay: .24s; }
  [data-reveal][data-delay="3"] { transition-delay: .36s; }
  [data-reveal][data-delay="4"] { transition-delay: .48s; }

  /* ─── GIANT KINETIC FOOTER ─── */
  .foot-kinetic {
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    margin-bottom: 60px;
    padding-top: 20px;
  }
  .foot-kinetic-track {
    display: inline-flex;
    animation: marquee 10s linear infinite;
    white-space: nowrap;
  }
  .foot-kinetic-track:hover { animation-play-state: paused; }
  /* a11y audit 2026-05-28 : respect prefers-reduced-motion (WCAG 2.3.3) */
  @media (prefers-reduced-motion: reduce) {
    .foot-kinetic-track { animation: none !important; }
  }
  .foot-kinetic-text {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(100px, 16vw, 260px);
    line-height: .85;
    letter-spacing: -.03em;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--border);
    padding-right: .2em;
    user-select: none;
    transition: -webkit-text-stroke-color .4s;
  }
  .foot-kinetic-track:hover .foot-kinetic-text {
    -webkit-text-stroke-color: var(--orange);
  }

  /* video fills the entire left panel */
  .spotm-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 0;
    display: block;
  }

  @media (max-width: 700px) {
    * { cursor: auto !important; }
    .cursor-dot, .cursor-ring { display: none; }
  }

  /* ─── Visually hidden (a11y) ─── */
  .visually-hidden {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* ─── GEO BLOCK (express trouve un club) ─── */
  .geo-block {
    margin: 0 auto;
    padding: 28px 32px 56px;
    max-width: 1280px;
  }
  .geo-inner {
    background: var(--glass-bg-strong, rgba(255,255,255,.72));
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--glass-border, rgba(255,255,255,.7));
    box-shadow: 0 8px 32px rgba(46,26,122,.08), inset 0 1px 0 rgba(255,255,255,.8);
    border-radius: 28px;
    padding: 36px 40px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 40px;
    align-items: center;
  }
  .geo-head .geo-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .geo-head .geo-eyebrow .num {
    background: var(--ink);
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 10px;
    letter-spacing: .08em;
  }
  .geo-title {
    font-family: 'Archivo Narrow', Impact, sans-serif;
    font-weight: 700;
    font-size: clamp(34px, 4.2vw, 56px);
    line-height: .92;
    letter-spacing: -.02em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .geo-title .ital {
    font-style: italic;
    font-weight: 500;
    color: var(--orange);
  }
  .geo-sub {
    font-size: 15px;
    line-height: 1.55;
    color: var(--gray);
    max-width: 420px;
  }
  .geo-form {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
  }
  .geo-input-wrap {
    grid-column: 1 / -1;
  }
  .geo-input-wrap input {
    width: 100%;
    padding: 16px 22px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    background: white;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    min-height: 56px;
  }
  .geo-input-wrap input:focus-visible {
    border-color: var(--violet);
    box-shadow: 0 0 0 4px rgba(108,71,255,.18);
  }
  .geo-input-wrap input::placeholder { color: var(--gray-light); }
  .geo-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 22px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .02em;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform .15s, background .15s, border-color .15s;
    min-height: 52px;
    line-height: 1;
  }
  .geo-btn:focus-visible {
    outline: 3px solid var(--violet);
    outline-offset: 3px;
  }
  .geo-btn-locate {
    background: white;
    color: var(--ink);
    border-color: var(--border);
  }
  .geo-btn-locate:hover {
    border-color: var(--ink);
    transform: translateY(-1px);
  }
  .geo-btn-locate:disabled {
    opacity: .65;
    cursor: wait;
  }
  .geo-btn-primary {
    background: var(--ink);
    color: white;
    grid-column: 1 / -1;
  }
  .geo-btn-primary:hover {
    background: var(--violet);
    transform: translateY(-1px);
  }
  .geo-error {
    grid-column: 1 / -1;
    color: var(--orange);
    font-size: 13px;
    font-weight: 500;
    min-height: 18px;
    margin-top: 4px;
  }

  @media (max-width: 860px) {
    .geo-block { padding: 16px 16px 40px; }
    .geo-inner {
      grid-template-columns: 1fr;
      padding: 28px 22px;
      gap: 24px;
      border-radius: 22px;
    }
    .geo-title { font-size: clamp(30px, 8vw, 44px); }
    .geo-form { grid-template-columns: 1fr; }
    .geo-btn-locate, .geo-btn-primary { grid-column: 1 / -1; width: 100%; }
  }
</style>
