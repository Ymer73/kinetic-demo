<script>
// ────────────────────────────────────────────────────────────
// QUIZ HANDISPORT - V1 simple (non adaptatif)
// 7 questions ciblées, scoring direct sur les sports parasport
// ────────────────────────────────────────────────────────────

// Sports parasport disponibles dans data.js
const PARA_SPORTS_IDS = [86, 130, 131, 132, 133, 134, 135, 139, 195, 196, 197, 198, 199, 463, 464, 465, 466, 467, 468, 469, 470, 471, 472, 473, 474];

// Profils par sport (mapping vers profils, environnement, intensité)
const PARA_PROFILES = {
  86:  { handi: ['fauteuil'],  env: 'indoor',  intensity: 4, collective: true,  outdoor: 0, water: 0 },
  130: { handi: ['fauteuil'],  env: 'indoor',  intensity: 5, collective: true,  outdoor: 0, water: 0 },
  131: { handi: ['fauteuil'],  env: 'mixed',   intensity: 4, collective: false, outdoor: 1, water: 0 },
  132: { handi: ['fauteuil','intel'], env: 'indoor', intensity: 2, collective: false, outdoor: 0, water: 0 },
  133: { handi: ['visuel'],    env: 'indoor',  intensity: 4, collective: true,  outdoor: 0, water: 0 },
  134: { handi: ['moteur','fauteuil'], env: 'outdoor', intensity: 4, collective: false, outdoor: 1, water: 0 },
  135: { handi: ['moteur'],    env: 'outdoor', intensity: 5, collective: false, outdoor: 1, water: 0 },
  139: { handi: ['moteur'],    env: 'indoor',  intensity: 3, collective: true,  outdoor: 0, water: 0 },
  195: { handi: ['visuel'],    env: 'mixed',   intensity: 4, collective: true,  outdoor: 1, water: 0 },
  196: { handi: ['moteur'],    env: 'outdoor', intensity: 3, collective: false, outdoor: 1, water: 0 },
  197: { handi: ['moteur','visuel'], env: 'outdoor', intensity: 3, collective: false, outdoor: 1, water: 0 },
  198: { handi: ['moteur'],    env: 'outdoor', intensity: 5, collective: false, outdoor: 1, water: 0.5 },
  199: { handi: ['fauteuil'],  env: 'indoor',  intensity: 3, collective: true,  outdoor: 0, water: 0 },
  463: { handi: ['fauteuil'],  env: 'indoor',  intensity: 3, collective: true,  outdoor: 0, water: 0 },
  464: { handi: ['fauteuil'],  env: 'mixed',   intensity: 4, collective: false, outdoor: 1, water: 0 },
  465: { handi: ['fauteuil'],  env: 'indoor',  intensity: 5, collective: true,  outdoor: 0, water: 0 },
  466: { handi: ['fauteuil'],  env: 'indoor',  intensity: 5, collective: true,  outdoor: 0, water: 0 },
  467: { handi: ['moteur'],    env: 'outdoor', intensity: 4, collective: false, outdoor: 1, water: 0 },
  468: { handi: ['moteur'],    env: 'outdoor', intensity: 5, collective: false, outdoor: 1, water: 1 },
  469: { handi: ['moteur'],    env: 'outdoor', intensity: 4, collective: false, outdoor: 1, water: 1 },
  470: { handi: ['intel'],     env: 'mixed',   intensity: 4, collective: false, outdoor: 0.5, water: 0 },
  471: { handi: ['intel'],     env: 'indoor',  intensity: 4, collective: false, outdoor: 0, water: 1 },
  472: { handi: ['moteur'],    env: 'outdoor', intensity: 5, collective: false, outdoor: 1, water: 0 },
  473: { handi: ['moteur'],    env: 'outdoor', intensity: 5, collective: false, outdoor: 1, water: 0 },
  474: { handi: ['moteur','visuel'], env: 'outdoor', intensity: 3, collective: false, outdoor: 1, water: 0 }
};

const HANDI_QUESTIONS = [
  { q: "Quel est le type de handicap principal ?",
    hint: "On adapte les recos en fonction. Tu peux changer ensuite.",
    type: "cards",
    block: "PROFIL",
    opts: [
      { l: "♿ Mobilité en fauteuil", value: "fauteuil" },
      { l: "🦿 Mobilité réduite (sans fauteuil)", value: "moteur" },
      { l: "👁️ Déficience visuelle", value: "visuel" },
      { l: "👂 Déficience auditive", value: "auditif" },
      { l: "🧠 Déficience intellectuelle ou psychique", value: "intel" },
      { l: "🤝 Plusieurs / autre", value: "autre" }
    ]
  },
  { q: "Tu cherches un sport...",
    type: "cards",
    block: "ENVIRONNEMENT",
    opts: [
      { l: "🏠 Plutôt en intérieur", value: "indoor" },
      { l: "🌳 Plutôt en extérieur", value: "outdoor" },
      { l: "🤷 L'un ou l'autre, je m'adapte", value: "mixed" }
    ]
  },
  { q: "Tu préfères pratiquer...",
    type: "cards",
    block: "AMBIANCE",
    opts: [
      { l: "👥 En équipe, avec d'autres", value: "collective" },
      { l: "🧘 Seul·e, à mon rythme", value: "solo" },
      { l: "🤷 Les deux selon les jours", value: "both" }
    ]
  },
  { q: "Quelle intensité tu recherches ?",
    left: "Doux, bien-être", right: "Intense, performance",
    type: "scale",
    block: "ÉNERGIE"
  },
  { q: "L'eau (piscine, mer, rivière) t'attire ?",
    type: "cards",
    block: "EAU",
    opts: [
      { l: "🌊 Oui, j'adore", value: "yes" },
      { l: "🏊 Pas particulièrement", value: "neutral" },
      { l: "🚫 Non merci", value: "no" }
    ]
  },
  { q: "Tu vises plutôt...",
    type: "cards",
    block: "OBJECTIF",
    opts: [
      { l: "🎯 Le loisir, le plaisir", value: "loisir" },
      { l: "🏆 La compétition, le dépassement", value: "compet" },
      { l: "🧘 Le bien-être, la rééducation", value: "bienetre" }
    ]
  },
  { q: "Combien de temps par semaine ?",
    type: "cards",
    block: "DISPO",
    opts: [
      { l: "⏱️ Moins de 2h", value: "low" },
      { l: "⏰ 2 à 5h", value: "med" },
      { l: "🔥 Plus de 5h", value: "high" }
    ]
  }
];

let qStep = 0;
let qAnswers = new Array(HANDI_QUESTIONS.length).fill(null);

function setNextEnabled(enabled) { document.getElementById('btn-next').disabled = !enabled; }

function updateProgress() {
  const total = HANDI_QUESTIONS.length;
  const displayStep = qStep + 1;
  const pct = Math.round((displayStep / total) * 100);
  document.getElementById('progress-label').textContent = `ÉTAPE ${String(displayStep).padStart(2,'0')}`;
  document.getElementById('ring-pct').textContent = `${displayStep}/${total}`;
  const circ = 2 * Math.PI * 26;
  document.getElementById('ring-fg').setAttribute('stroke-dashoffset', circ * (1 - pct / 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('bloc-label').textContent = HANDI_QUESTIONS[qStep].block || '';
  document.getElementById('back-btn').style.visibility = qStep > 0 ? 'visible' : 'hidden';
}

function render() {
  const q = HANDI_QUESTIONS[qStep];
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('question-hint').textContent = q.hint || '';
  updateProgress();

  const isLast = qStep === HANDI_QUESTIONS.length - 1;
  document.getElementById('btn-next').textContent = isLast ? 'Voir mes sports →' : 'Suivant →';

  const body = document.getElementById('question-body');
  body.innerHTML = '';

  if (q.type === 'cards') {
    const grid = document.createElement('div');
    grid.className = 'motivation-grid';
    q.opts.forEach((opt, i) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'mot-card' + (qAnswers[qStep] === i ? ' selected' : '');
      card.setAttribute('aria-pressed', qAnswers[qStep] === i ? 'true' : 'false');
      card.innerHTML = `<span style="font-size:22px;flex-shrink:0" aria-hidden="true">${opt.l.match(/^\S+/)[0]}</span><span style="flex:1">${opt.l.replace(/^\S+\s*/, '')}</span>`;
      card.onclick = () => { qAnswers[qStep] = i; render(); setNextEnabled(true); };
      grid.appendChild(card);
    });
    body.appendChild(grid);
  } else if (q.type === 'scale') {
    const wrap = document.createElement('div');
    wrap.className = 'scale-wrap';
    const row = document.createElement('div');
    row.className = 'scale-row';
    const left = document.createElement('span'); left.className = 'scale-label'; left.textContent = q.left || '';
    const circles = document.createElement('div'); circles.className = 'scale-circles';
    const labels = ['Pas du tout','Plutôt non','Neutre','Plutôt oui','Totalement'];
    for (let i=0; i<5; i++) {
      const c = document.createElement('button');
      c.className = 'scale-circle' + (qAnswers[qStep] === i ? ' selected' : '');
      c.setAttribute('aria-label', labels[i]);
      c.onclick = () => { qAnswers[qStep] = i; render(); setNextEnabled(true); };
      circles.appendChild(c);
    }
    const right = document.createElement('span'); right.className = 'scale-label right'; right.textContent = q.right || '';
    row.appendChild(left); row.appendChild(circles); row.appendChild(right);
    wrap.appendChild(row);
    body.appendChild(wrap);
  }

  setNextEnabled(qAnswers[qStep] !== null);
}

function nextQ() {
  if (qStep < HANDI_QUESTIONS.length - 1) {
    qStep++;
    render();
  } else {
    showResults();
  }
}

function prevQ() { if (qStep > 0) { qStep--; render(); } }

function score(profile, ans) {
  let s = 50;
  // Q0 : type handicap (filtre dur sur match)
  const handi = HANDI_QUESTIONS[0].opts[ans[0]].value;
  if (profile.handi.includes(handi)) s += 35;
  else if (handi === 'autre') s += 10;
  else s -= 25;

  // Q1 : environnement
  const envWanted = HANDI_QUESTIONS[1].opts[ans[1]].value;
  if (envWanted === 'mixed') s += 5;
  else if (profile.env === envWanted) s += 10;
  else s -= 5;

  // Q2 : collectif
  const collWanted = HANDI_QUESTIONS[2].opts[ans[2]].value;
  if (collWanted === 'both') s += 3;
  else if (collWanted === 'collective' && profile.collective) s += 8;
  else if (collWanted === 'solo' && !profile.collective) s += 8;
  else s -= 4;

  // Q3 : intensité (scale 0-4)
  const intWant = (ans[3] || 0) + 1; // 1-5
  s -= Math.abs(intWant - profile.intensity) * 4;

  // Q4 : eau
  const waterAns = HANDI_QUESTIONS[4].opts[ans[4]].value;
  if (waterAns === 'yes' && profile.water > 0) s += 8;
  else if (waterAns === 'no' && profile.water > 0) s -= 12;

  // Q5 : objectif (loisir/compet/bienetre) - on ajuste par intensité
  const objWanted = HANDI_QUESTIONS[5].opts[ans[5]].value;
  if (objWanted === 'compet' && profile.intensity >= 4) s += 6;
  else if (objWanted === 'bienetre' && profile.intensity <= 3) s += 6;
  else if (objWanted === 'loisir') s += 3;

  // Q6 : dispo (low/med/high) - on ne fait pas de hard filter ici
  // Léger ajustement seulement
  const dispoAns = HANDI_QUESTIONS[6].opts[ans[6]].value;
  if (dispoAns === 'low' && profile.intensity >= 4) s -= 4;
  if (dispoAns === 'high' && profile.intensity >= 4) s += 4;

  return Math.max(0, Math.min(100, s));
}

function showResults() {
  const ranked = PARA_SPORTS_IDS
    .map(id => {
      const profile = PARA_PROFILES[id];
      const sport = SPORTS.find(s => s.id === id);
      if (!sport || !profile) return null;
      return { sport, score: score(profile, qAnswers), profile };
    })
    .filter(Boolean)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6);

  const TAGS = { fauteuil: 'Fauteuil', moteur: 'Mobilité', visuel: 'Déf. visuelle', auditif: 'Déf. auditive', intel: 'Sport adapté' };

  document.querySelector('main').innerHTML = `
    <div class="results-wrap">
      <div class="res-header">
        <div class="res-eyebrow">VOICI TES RÉSULTATS</div>
        <h1 class="res-title">Tes <span class="italic">parasports</span><br>compatibles</h1>
        <p class="res-sub">Top ${ranked.length} sports sélectionnés selon ton profil. Le 1er est le plus aligné.</p>
      </div>
      <div class="res-list">
        ${ranked.map((r, i) => {
          const handi = r.profile.handi[0] || 'moteur';
          const tag = TAGS[handi] || 'Adapté';
          return `
            <a class="res-card${i === 0 ? ' rank-1' : ''}" href="sport.html?id=${r.sport.id}">
              <span class="rc-rank">№${String(i+1).padStart(2,'0')}</span>
              <span class="rc-icon">🏅</span>
              <div>
                <div class="rc-name">${r.sport.nom}</div>
                <div class="rc-cat">${r.sport.cat}</div>
                <span class="rc-tag">${tag}</span>
              </div>
              <span class="rc-pct">${r.score}%</span>
            </a>
          `;
        }).join('')}
      </div>
      <div class="res-actions">
        <a href="map-handisport.html" class="btn btn-primary btn-lg">Voir les clubs adaptés →</a>
        <button onclick="window.location.reload()" class="btn btn-glass btn-lg">↩ Recommencer</button>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
